      +
      +```ts
      +import { Management } from "auth0";
      +
      +const strategy = Management.PhoneProviderProtectionBackoffStrategyEnum.None; // "none"
      +```
      +
      +**After (v6):**
      +
      +```ts
      +import { Management } from "auth0";
      +
      +const strategy = Management.PhoneProviderProtectionBackoffStrategyEnum.Default; // "default"
      +```
